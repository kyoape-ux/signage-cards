<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公播圖卡管理系統 — 光田綜合醫院</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<!-- 頂部導航 -->
<header class="top-bar">
  <div class="logo">
    <div class="logo-icon">📺</div>
    <div class="logo-text">公播圖卡管理<small>光田綜合醫院</small></div>
  </div>
  <div class="top-bar-actions">
    <button class="btn btn-secondary btn-sm tab-btn active" data-tab="cards" onclick="switchTab('cards')">🖼 圖卡</button>
    <button class="btn btn-secondary btn-sm tab-btn" data-tab="channels" onclick="switchTab('channels')">📺 頻道</button>
    <button class="btn btn-secondary btn-sm" onclick="toggleSettings()">⚙ 設定</button>
  </div>
</header>

<!-- ========== 圖卡管理頁 ========== -->
<div id="tab-cards">

  <!-- 儀表板 -->
  <section class="dashboard" id="dashboard">
    <div class="stat-card active" onclick="filterByStatus('active')">
      <div class="stat-number" id="count-active">0</div>
      <div class="stat-label">🟢 播放中</div>
    </div>
    <div class="stat-card expiring" onclick="filterByStatus('expiring')">
      <div class="stat-number" id="count-expiring">0</div>
      <div class="stat-label">🟡 即將到期</div>
    </div>
    <div class="stat-card expired" onclick="filterByStatus('expired')">
      <div class="stat-number" id="count-expired">0</div>
      <div class="stat-label">🔴 已過期</div>
    </div>
    <div class="stat-card disabled" onclick="filterByStatus('disabled')">
      <div class="stat-number" id="count-disabled">0</div>
      <div class="stat-label">⚫ 已停用</div>
    </div>
  </section>

  <!-- 工具列 -->
  <section class="toolbar" id="toolbar">
    <select id="filter-tag" onchange="applyFilters()">
      <option value="">全部標籤</option>
    </select>
    <select id="filter-channel" onchange="applyFilters()">
      <option value="">全部頻道</option>
    </select>
    <select id="filter-status" onchange="applyFilters()">
      <option value="">全部狀態</option>
      <option value="active">播放中</option>
      <option value="expiring">即將到期</option>
      <option value="expired">已過期</option>
      <option value="disabled">已停用</option>
    </select>
    <div class="spacer"></div>
    <button class="btn btn-secondary btn-sm" id="btn-batch" style="display:none" onclick="showBatchMenu()">📋 批次操作</button>
    <button class="btn btn-primary btn-sm" style="background:#ff9800" onclick="openQuickInsert()">⚡ 快速插播</button>
    <button class="btn btn-primary btn-sm" style="background:#2196F3" onclick="openBulkUpload()">📦 批次上傳</button>
    <button class="btn btn-primary" onclick="openAddModal()">＋ 新增圖卡</button>
  </section>

  <!-- 圖卡列表 -->
  <section class="card-list" id="card-list">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">📭</div>
      <p>尚無圖卡，點擊「＋ 新增圖卡」開始</p>
    </div>
  </section>
</div>

<!-- ========== 頻道管理頁 ========== -->
<div id="tab-channels" style="display:none">
  <section class="toolbar">
    <div class="spacer"></div>
    <button class="btn btn-primary" onclick="openAddChannel()">＋ 新增頻道</button>
  </section>
  <section class="card-list" id="channel-list"></section>
</div>

<!-- ========== 設定面板 ========== -->
<section class="settings-panel" id="settings-panel">
  <div class="settings-section">
    <h3>📁 GitHub 設定</h3>
    <div class="form-row">
      <div class="form-group">
        <label>Owner</label>
        <input type="text" id="cfg-gh-owner" placeholder="帳號">
      </div>
      <div class="form-group">
        <label>Repo</label>
        <input type="text" id="cfg-gh-repo" placeholder="repo">
      </div>
    </div>
    <div class="form-group">
      <label>Personal Access Token</label>
      <input type="password" id="cfg-gh-token" placeholder="ghp_xxxx">
    </div>
  </div>
  <div class="settings-section">
    <h3>⏱ 預設值</h3>
    <div class="form-row">
      <div class="form-group">
        <label>預設圖卡天數</label>
        <input type="number" id="cfg-default-days" value="90" min="1">
      </div>
      <div class="form-group">
        <label>即將到期提醒（天）</label>
        <input type="number" id="cfg-expiring-days" value="3" min="1">
      </div>
    </div>
  </div>
  <div class="settings-section">
    <h3>🏷 常用標籤管理</h3>
    <div class="form-group">
      <label>每行一個標籤（可自由新增）</label>
      <textarea id="cfg-tags" rows="8" style="font-size:13px;line-height:1.8"></textarea>
    </div>
  </div>
  <button class="btn btn-primary" onclick="saveSettings()">💾 儲存設定</button>
</section>

<!-- ========== 新增/編輯圖卡 Modal ========== -->
<div class="modal-overlay" id="card-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">新增圖卡</h2>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>標題</label>
        <input type="text" id="card-title" placeholder="例如：四月衛教-糖尿病預防">
      </div>

      <!-- 標籤選擇 -->
      <div class="form-group">
        <label>標籤（決定播放在哪些頻道）</label>
        <div id="tag-checkboxes" class="tag-grid"></div>
        <div style="margin-top:8px;display:flex;gap:8px">
          <input type="text" id="new-tag-input" placeholder="自訂標籤..." style="flex:1;padding:6px 10px;background:var(--bg-input);border:1px solid var(--border-color);border-radius:6px;color:var(--text-primary);font-size:12px">
          <button class="btn btn-secondary btn-sm" onclick="addCustomTag()">＋</button>
        </div>
      </div>

      <!-- 指定頻道（可選） -->
      <div class="form-group">
        <label>指定頻道 <span style="color:var(--text-muted);font-weight:300">（可選，勾選後只播這些螢幕，不走標籤）</span></label>
        <div id="channel-checkboxes" class="tag-grid"></div>
      </div>

      <!-- 多尺寸圖片上傳 -->
      <div class="form-group">
        <label>圖片（按需上傳各尺寸，沒上傳的尺寸該頻道不播）</label>
        <div id="variant-uploads"></div>
      </div>

      <!-- 日期排程 -->
      <div class="form-row">
        <div class="form-group">
          <label>上架日期</label>
          <input type="date" id="card-start-date">
        </div>
        <div class="form-group">
          <label>下架日期</label>
          <input type="date" id="card-end-date">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>每日開始時間</label>
          <input type="time" id="card-start-time" value="00:00">
        </div>
        <div class="form-group">
          <label>每日結束時間</label>
          <input type="time" id="card-end-time" value="23:59">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>排序（數字越小越前）</label>
          <input type="number" id="card-sort" value="10" min="0">
        </div>
        <div class="form-group">
          <label>優先權</label>
          <select id="card-priority">
            <option value="normal">一般</option>
            <option value="urgent">插播（優先顯示）</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>備註</label>
        <textarea id="card-note" rows="2" placeholder="選填"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveCard()">💾 儲存</button>
    </div>
  </div>
</div>

<!-- ========== 頻道編輯 Modal ========== -->
<div class="modal-overlay" id="channel-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="ch-modal-title">編輯頻道</h2>
      <button class="modal-close" onclick="closeChannelModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label>名稱</label>
          <input type="text" id="ch-name" placeholder="例：大廳公共區域">
        </div>
        <div class="form-group">
          <label>位置</label>
          <input type="text" id="ch-location" placeholder="例：大廳">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>尺寸</label>
          <select id="ch-size">
            <option value="1920x1080">1920×1080 橫式</option>
            <option value="1080x1920">1080×1920 直式</option>
            <option value="800x1080">800×1080 右半版</option>
            <option value="1080x1162">1080×1162 海報</option>
          </select>
        </div>
        <div class="form-group">
          <label>輪播秒數</label>
          <input type="number" id="ch-interval" value="8" min="3">
        </div>
      </div>
      <div class="form-group">
        <label>訂閱標籤（勾選後，有該標籤的圖卡會自動播放在此頻道）</label>
        <div id="ch-tag-checkboxes" class="tag-grid"></div>
      </div>
      <div class="form-group">
        <label>播放器 URL</label>
        <input type="text" id="ch-player-url" readonly style="color:var(--kt-green-light);cursor:pointer" onclick="this.select();document.execCommand('copy');toast('已複製 URL','success')">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeChannelModal()">取消</button>
      <button class="btn btn-primary" onclick="saveChannel()">💾 儲存</button>
    </div>
  </div>
</div>

<!-- ========== 批次上傳 Modal ========== -->
<div class="modal-overlay" id="bulk-modal">
  <div class="modal" style="max-width:780px">
    <div class="modal-header">
      <h2>📦 批次上傳圖卡</h2>
      <button class="modal-close" onclick="closeBulkModal()">&times;</button>
    </div>
    <div class="modal-body">
      <!-- 拖入區 -->
      <div class="bulk-dropzone" id="bulk-dropzone">
        <div class="upload-icon">📁</div>
        <div class="upload-text">拖入多張圖片，或 <strong>點擊選擇</strong></div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:6px">系統會自動偵測圖片尺寸，對應到正確的螢幕規格</div>
        <input type="file" id="bulk-file-input" multiple accept="image/*" style="display:none">
      </div>

      <!-- 圖片列表 -->
      <div id="bulk-list" style="margin-top:12px"></div>

      <!-- 共用設定 -->
      <div id="bulk-shared-settings" style="display:none;margin-top:16px;padding-top:16px;border-top:1px solid var(--border-color)">
        <h3 style="font-size:14px;margin-bottom:12px">📋 共用設定（套用到所有圖卡）</h3>
        <div class="form-group">
          <label>標籤</label>
          <div id="bulk-tag-checkboxes" class="tag-grid"></div>
        </div>
        <div class="form-group">
          <label>指定頻道 <span style="color:var(--text-muted);font-weight:300">（可選）</span></label>
          <div id="bulk-channel-checkboxes" class="tag-grid"></div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>上架日期</label>
            <input type="date" id="bulk-start-date">
          </div>
          <div class="form-group">
            <label>下架日期</label>
            <input type="date" id="bulk-end-date">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>優先權</label>
            <select id="bulk-priority">
              <option value="normal">一般</option>
              <option value="urgent">插播（優先顯示）</option>
            </select>
          </div>
          <div class="form-group">
            <label>起始排序</label>
            <input type="number" id="bulk-sort-start" value="10" min="0">
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <span style="flex:1;font-size:12px;color:var(--text-secondary)" id="bulk-summary"></span>
      <button class="btn btn-secondary" onclick="closeBulkModal()">取消</button>
      <button class="btn btn-primary" id="bulk-submit-btn" onclick="executeBulkUpload()" style="display:none">🚀 全部上傳建立</button>
    </div>
  </div>
</div>

<!-- 批次 Modal -->
<div class="modal-overlay" id="batch-modal">
  <div class="modal" style="max-width:400px">
    <div class="modal-header">
      <h2>批次操作</h2>
      <button class="modal-close" onclick="closeBatchModal()">&times;</button>
    </div>
    <div class="modal-body">
      <p style="font-size:13px;color:var(--text-secondary);margin-bottom:16px">已選取 <strong id="batch-count">0</strong> 張圖卡</p>
      <div class="form-group">
        <select id="batch-action">
          <option value="enable">批次啟用</option>
          <option value="disable">批次停用</option>
          <option value="extend">批次延期</option>
          <option value="delete">批次刪除</option>
        </select>
      </div>
      <div class="form-group" id="batch-extend-group" style="display:none">
        <label>延長天數</label>
        <input type="number" id="batch-extend-days" value="90" min="1">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeBatchModal()">取消</button>
      <button class="btn btn-primary" onclick="executeBatch()">✓ 執行</button>
    </div>
  </div>
</div>

<div class="loading-overlay" id="loading"><div class="loading-spinner"></div></div>
<div class="toast-container" id="toast-container"></div>
<input type="hidden" id="editing-card-id" value="">
<input type="hidden" id="editing-channel-id" value="">

<style>
  .tag-grid { display:flex; flex-wrap:wrap; gap:6px; }
  .tag-chip { display:inline-flex; align-items:center; gap:4px; padding:4px 10px; border-radius:16px;
    background:var(--bg-input); border:1px solid var(--border-color); font-size:12px; cursor:pointer; transition:all .2s; }
  .tag-chip:hover { border-color:var(--kt-green); }
  .tag-chip.selected { background:var(--kt-green); border-color:var(--kt-green); color:#fff; }
  .tag-chip input { display:none; }
  .tab-btn.active { background:var(--kt-green) !important; color:#fff !important; border-color:var(--kt-green) !important; }
  .variant-row { display:flex; align-items:center; gap:10px; padding:8px 12px; background:var(--bg-input);
    border-radius:var(--radius); margin-bottom:6px; }
  .variant-row .size-label { font-size:12px; font-weight:500; min-width:100px; }
  .variant-row .variant-preview { width:60px; height:40px; object-fit:contain; border-radius:4px; background:#111; }
  .variant-row .variant-status { font-size:11px; color:var(--text-muted); flex:1; }
  .variant-row .btn { flex-shrink:0; }
  .channel-card { background:var(--bg-card); border-radius:var(--radius); padding:16px; border:1px solid var(--border-color); }
  .channel-card .ch-name { font-size:15px; font-weight:500; margin-bottom:6px; }
  .channel-card .ch-meta { font-size:12px; color:var(--text-secondary); display:flex; flex-direction:column; gap:3px; }
  .channel-card .ch-tags { display:flex; flex-wrap:wrap; gap:4px; margin-top:8px; }
  .channel-card .ch-tag { font-size:10px; padding:2px 8px; border-radius:10px; background:rgba(15,110,86,0.2); color:var(--kt-green-light); }
  .channel-card .ch-url { font-size:11px; color:var(--kt-green-light); margin-top:8px; word-break:break-all; cursor:pointer; }
  .channel-card .ch-actions { margin-top:10px; display:flex; gap:6px; }
  /* 批次上傳 */
  .bulk-dropzone { border:2px dashed var(--border-color); border-radius:var(--radius); padding:40px;
    text-align:center; cursor:pointer; transition:all .2s; background:var(--bg-input); }
  .bulk-dropzone:hover, .bulk-dropzone.dragover { border-color:var(--kt-green); background:rgba(15,110,86,0.1); }
  .bulk-item { display:flex; align-items:center; gap:10px; padding:10px 12px; background:var(--bg-input);
    border-radius:var(--radius); margin-bottom:6px; }
  .bulk-item img { width:60px; height:40px; object-fit:contain; border-radius:4px; background:#111; flex-shrink:0; }
  .bulk-item .bulk-title { flex:1; background:var(--bg-card); border:1px solid var(--border-color);
    border-radius:6px; padding:6px 10px; color:var(--text-primary); font-size:13px; outline:none; }
  .bulk-item .bulk-title:focus { border-color:var(--kt-green); }
  .bulk-item .bulk-size { font-size:11px; color:var(--kt-green-light); min-width:90px; text-align:center; }
  .bulk-item .bulk-remove { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:16px; padding:4px; }
  .bulk-item .bulk-remove:hover { color:var(--status-expired); }
  .bulk-progress { height:3px; background:var(--border-color); border-radius:2px; margin-top:12px; overflow:hidden; }
  .bulk-progress .bar { height:100%; background:var(--kt-green); transition:width .3s; width:0%; }
</style>

<script src="js/admin.js"></script>
</body>
</html>
