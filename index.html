<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公播圖卡管理系統 — 光田綜合醫院</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<!-- ============================================================
     頂部導航
     ============================================================ -->
<header class="top-bar">
  <div class="logo">
    <div class="logo-icon">📺</div>
    <div class="logo-text">
      公播圖卡管理
      <small>光田綜合醫院</small>
    </div>
  </div>
  <div class="top-bar-actions">
    <button class="btn btn-secondary btn-sm" onclick="openPreview()">👁 預覽</button>
    <button class="btn btn-secondary btn-sm" onclick="toggleSettings()">⚙ 設定</button>
  </div>
</header>

<!-- ============================================================
     儀表板
     ============================================================ -->
<section class="dashboard" id="dashboard">
  <div class="stat-card active" onclick="filterByStatus('active')">
    <div class="stat-number" id="count-active">0</div>
    <div class="stat-label">🟢 播放中</div>
  </div>
  <div class="stat-card expiring" onclick="filterByStatus('expiring')">
    <div class="stat-number" id="count-expiring">0</div>
    <div class="stat-label">🟡 即將到期</div>
  </div>
  <div class="stat-card expired" onclick="filterByStatus('expired')">
    <div class="stat-number" id="count-expired">0</div>
    <div class="stat-label">🔴 已過期</div>
  </div>
  <div class="stat-card disabled" onclick="filterByStatus('disabled')">
    <div class="stat-number" id="count-disabled">0</div>
    <div class="stat-label">⚫ 已停用</div>
  </div>
</section>

<!-- ============================================================
     工具列
     ============================================================ -->
<section class="toolbar" id="toolbar">
  <select id="filter-group" onchange="applyFilters()">
    <option value="">全部群組</option>
  </select>
  <select id="filter-size" onchange="applyFilters()">
    <option value="">全部尺寸</option>
    <option value="1920x1080">1920×1080 橫式</option>
    <option value="1080x1920">1080×1920 直式</option>
    <option value="800x1080">800×1080 右半版</option>
  </select>
  <select id="filter-status" onchange="applyFilters()">
    <option value="">全部狀態</option>
    <option value="active">播放中</option>
    <option value="expiring">即將到期</option>
    <option value="expired">已過期</option>
    <option value="disabled">已停用</option>
  </select>
  <div class="spacer"></div>
  <button class="btn btn-secondary btn-sm" id="btn-batch" style="display:none" onclick="showBatchMenu()">
    📋 批次操作
  </button>
  <button class="btn btn-primary" onclick="openAddModal()">＋ 新增圖卡</button>
</section>

<!-- ============================================================
     圖卡列表
     ============================================================ -->
<section class="card-list" id="card-list">
  <div class="empty-state" id="empty-state">
    <div class="empty-icon">📭</div>
    <p>尚無圖卡，點擊右上角「＋ 新增圖卡」開始</p>
  </div>
</section>

<!-- ============================================================
     設定面板
     ============================================================ -->
<section class="settings-panel" id="settings-panel">
  <div class="settings-section">
    <h3>📊 Google Sheets 設定</h3>
    <div class="form-group">
      <label>Google Sheets ID</label>
      <input type="text" id="cfg-sheet-id" placeholder="試算表 ID">
    </div>
    <div class="form-group">
      <label>Apps Script Web App URL</label>
      <input type="text" id="cfg-apps-script-url" placeholder="https://script.google.com/macros/s/.../exec">
    </div>
  </div>
  <div class="settings-section">
    <h3>📁 GitHub 圖片上傳設定</h3>
    <div class="form-group">
      <label>GitHub Owner / Repo</label>
      <div class="form-row">
        <input type="text" id="cfg-gh-owner" placeholder="帳號名稱">
        <input type="text" id="cfg-gh-repo" placeholder="repo 名稱">
      </div>
    </div>
    <div class="form-group">
      <label>GitHub Personal Access Token</label>
      <input type="password" id="cfg-gh-token" placeholder="ghp_xxxx（只存在本機）">
    </div>
  </div>
  <div class="settings-section">
    <h3>⏱ 預設值</h3>
    <div class="form-row">
      <div class="form-group">
        <label>預設圖卡天數</label>
        <input type="number" id="cfg-default-days" value="90" min="1">
      </div>
      <div class="form-group">
        <label>即將到期提醒（天）</label>
        <input type="number" id="cfg-expiring-days" value="3" min="1">
      </div>
    </div>
  </div>
  <button class="btn btn-primary" onclick="saveSettings()">💾 儲存設定</button>
</section>

<!-- ============================================================
     新增/編輯 Modal
     ============================================================ -->
<div class="modal-overlay" id="card-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">新增圖卡</h2>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <!-- 圖片上傳 -->
      <div class="form-group">
        <label>圖片</label>
        <div class="upload-area" id="upload-area">
          <div class="upload-icon">🖼</div>
          <div class="upload-text">拖曳圖片到此處，或<strong>點擊選擇</strong></div>
        </div>
        <div class="upload-preview" id="upload-preview">
          <img id="preview-img" src="" alt="預覽">
          <button class="remove-img" onclick="removeImage()">&times;</button>
        </div>
        <input type="file" id="file-input" accept="image/*" style="display:none">
      </div>

      <!-- 群組 + 尺寸 -->
      <div class="form-row">
        <div class="form-group">
          <label>群組</label>
          <select id="card-group">
            <option value="公共區域直式">公共區域直式</option>
            <option value="公共區域宣傳橫式">公共區域宣傳橫式</option>
            <option value="門診大內科全區">門診大內科全區</option>
            <option value="門診大外科全區">門診大外科全區</option>
            <option value="婦女整合門診">婦女整合門診</option>
          </select>
        </div>
        <div class="form-group">
          <label>尺寸</label>
          <select id="card-size">
            <option value="1920x1080">1920×1080 橫式</option>
            <option value="1080x1920">1080×1920 直式</option>
            <option value="800x1080">800×1080 右半版</option>
          </select>
        </div>
      </div>

      <!-- 日期 -->
      <div class="form-row">
        <div class="form-group">
          <label>上架日期</label>
          <input type="date" id="card-start-date">
        </div>
        <div class="form-group">
          <label>下架日期</label>
          <input type="date" id="card-end-date">
        </div>
      </div>

      <!-- 時段 -->
      <div class="form-row">
        <div class="form-group">
          <label>每日開始時間</label>
          <input type="time" id="card-start-time" value="00:00">
        </div>
        <div class="form-group">
          <label>每日結束時間</label>
          <input type="time" id="card-end-time" value="23:59">
        </div>
      </div>

      <!-- 排序 -->
      <div class="form-row">
        <div class="form-group">
          <label>排序（數字越小越前面）</label>
          <input type="number" id="card-sort" value="1" min="0">
        </div>
        <div class="form-group">
          <label>狀態</label>
          <select id="card-enabled">
            <option value="TRUE">啟用</option>
            <option value="FALSE">停用</option>
          </select>
        </div>
      </div>

      <!-- 備註 -->
      <div class="form-group">
        <label>備註</label>
        <textarea id="card-note" rows="2" placeholder="選填"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" id="btn-save-card" onclick="saveCard()">💾 儲存</button>
    </div>
  </div>
</div>

<!-- ============================================================
     批次延期 Modal
     ============================================================ -->
<div class="modal-overlay" id="batch-modal">
  <div class="modal" style="max-width:400px">
    <div class="modal-header">
      <h2>批次操作</h2>
      <button class="modal-close" onclick="closeBatchModal()">&times;</button>
    </div>
    <div class="modal-body">
      <p style="font-size:13px;color:var(--text-secondary);margin-bottom:16px">
        已選取 <strong id="batch-count">0</strong> 張圖卡
      </p>
      <div class="form-group">
        <label>操作</label>
        <select id="batch-action">
          <option value="enable">批次啟用</option>
          <option value="disable">批次停用</option>
          <option value="extend">批次延期</option>
          <option value="delete">批次刪除</option>
        </select>
      </div>
      <div class="form-group" id="batch-extend-group" style="display:none">
        <label>延長天數</label>
        <input type="number" id="batch-extend-days" value="90" min="1">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeBatchModal()">取消</button>
      <button class="btn btn-primary" onclick="executeBatch()">✓ 執行</button>
    </div>
  </div>
</div>

<!-- Loading -->
<div class="loading-overlay" id="loading">
  <div class="loading-spinner"></div>
</div>

<!-- Toast -->
<div class="toast-container" id="toast-container"></div>

<input type="hidden" id="editing-card-id" value="">

<script src="js/admin.js"></script>
</body>
</html>
